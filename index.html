<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 여행지 추천</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; background-color: #f4f7f6; padding: 50px 20px; margin: 0; }
        .container { max-width: 500px; background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: 0 auto; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 25px; }
        select { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        select:focus { border-color: #0070f3; }
        button { width: 100%; padding: 14px; background-color: #0070f3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #005bb5; }
        #result { margin-top: 35px; display: none; text-align: left; padding-top: 25px; border-top: 1px solid #eee; }
        #result img { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .destination { font-size: 22px; font-weight: bold; color: #0070f3; margin-bottom: 10px; text-align: center; }
        .description { font-size: 15px; color: #555; line-height: 1.6; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ 내 MBTI에 맞는 여행지는?</h1>
        <p>당신의 MBTI를 선택하고 여행지를 추천받아보세요!</p>
        
        <select id="mbti-select">
            <option value="ISTJ">ISTJ - 현실주의자</option>
            <option value="ISFJ">ISFJ - 수호자</option>
            <option value="INFJ">INFJ - 옹호자</option>
            <option value="INTJ">INTJ - 전략가</option>
            <option value="ISTP">ISTP - 장인</option>
            <option value="ISFP">ISFP - 모험가</option>
            <option value="INFP">INFP - 중재자</option>
            <option value="INTP">INTP - 논리술사</option>
            <option value="ESTP">ESTP - 사업가</option>
            <option value="ESFP">ESFP - 연예인</option>
            <option value="ENFP">ENFP - 활동가</option>
            <option value="ENTP">ENTP - 변론가</option>
            <option value="ESTJ">ESTJ - 경영자</option>
            <option value="ESFJ">ESFJ - 집정관</option>
            <option value="ENFJ">ENFJ - 선도자</option>
            <option value="ENTJ">ENTJ - 통솔자</option>
        </select>
        <button onclick="recommend()">어디로 떠날까?</button>

        <div id="result">
            <div class="destination" id="dest-name"></div>
            <div class="description" id="dest-desc"></div>
            <img id="dest-img" src="" alt="여행지 이미지">
        </div>
    </div>

    <script>
        const travelData = {
            "ISTJ": { name: "🇨🇭 스위스 융프라우", desc: "계획대로 움직이는 것을 좋아하는 당신! 체계적인 교통 시스템과 경이로운 자연이 있는 스위스를 추천합니다.", img: "https://images.unsplash.com/photo-1530122037265-a5f1f91d3b99?auto=format&fit=crop&w=800&q=80" },
            "ISFJ": { name: "🇯🇵 일본 교토", desc: "따뜻하고 세심한 당신에게는 조용하고 고즈넉한 전통의 미가 살아있는 교토가 제격입니다.", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80" },
            "INFJ": { name: "🇮🇸 아이슬란드", desc: "혼자만의 깊은 생각과 영감을 중시하는 당신에게 어울리는 신비롭고 조용한 아이슬란드!", img: "https://images.unsplash.com/photo-1476610182048-b716b8518aae?auto=format&fit=crop&w=800&q=80" },
            "INTJ": { name: "🇬🇧 영국 런던", desc: "지적 호기심이 많은 당신, 역사와 현대가 공존하는 런던의 다양한 박물관과 갤러리를 탐험해보세요.", img: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=800&q=80" },
            "ISTP": { name: "🇳🇿 뉴질랜드 퀸스타운", desc: "모험과 스릴을 즐기는 당신! 다양한 액티비티가 기다리고 있는 뉴질랜드가 최고의 선택입니다.", img: "https://images.unsplash.com/photo-1507699622108-4be3abd695ad?auto=format&fit=crop&w=800&q=80" },
            "ISFP": { name: "🇮🇩 인도네시아 발리", desc: "자유롭고 예술적인 감각을 지닌 당신에게는 아름다운 자연과 여유가 넘치는 발리를 추천해요.", img: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=800&q=80" },
            "INFP": { name: "🇫🇷 프랑스 파리", desc: "낭만과 상상력이 풍부한 당신! 아름다운 건축물과 에펠탑이 있는 파리에서 로맨스를 느껴보세요.", img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=800&q=80" },
            "INTP": { name: "🇺🇸 미국 샌프란시스코", desc: "새로운 아이디어와 혁신에 관심 많은 당신, 기술과 문화의 중심지 샌프란시스코로 떠나보세요.", img: "https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=800&q=80" },
            "ESTP": { name: "🇺🇸 미국 라스베이거스", desc: "에너지 넘치고 자극을 즐기는 당신에게 24시간 잠들지 않는 도시 라스베이거스를 추천합니다!", img: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=800&q=80" },
            "ESFP": { name: "🇧🇷 브라질 리우데자네이루", desc: "사람들과 어울리는 것을 좋아하고 열정이 넘치는 당신! 축제의 도시 리우데자네이루가 딱이에요.", img: "https://images.unsplash.com/photo-1483729558449-99ef09a8c325?auto=format&fit=crop&w=800&q=80" },
            "ENFP": { name: "🇹🇭 태국 방콕", desc: "호기심 많고 활기찬 당신! 다양한 길거리 음식과 화려한 야시장이 있는 방콕으로 떠나보세요.", img: "https://images.unsplash.com/photo-1508009603885-247a50543a35?auto=format&fit=crop&w=800&q=80" },
            "ENTP": { name: "🇩🇪 독일 베를린", desc: "자유분방하고 논쟁을 즐기며 새로운 것을 탐구하는 당신에게 다양한 서브컬처가 있는 베를린을 추천합니다.", img: "https://images.unsplash.com/photo-1560969184-10fe8719e047?auto=format&fit=crop&w=800&q=80" },
            "ESTJ": { name: "🇸🇬 싱가포르", desc: "효율적이고 질서를 중시하는 당신! 깔끔하고 완벽한 도시 인프라를 갖춘 싱가포르가 제격입니다.", img: "https://images.unsplash.com/photo-1525625293386-3f8f99389edd?auto=format&fit=crop&w=800&q=80" },
            "ESFJ": { name: "🇮🇹 이탈리아 로마", desc: "친화력이 좋고 사람들과의 유대를 중시하는 당신, 역사와 미식이 가득한 로마에서 따뜻함을 느껴보세요.", img: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=800&q=80" },
            "ENFJ": { name: "🇪🇸 스페인 바르셀로나", desc: "따뜻한 카리스마로 사람들을 이끄는 당신! 열정적인 사람들과 가우디의 예술이 숨쉬는 바르셀로나를 추천합니다.", img: "https://images.unsplash.com/photo-1583422409516-2895a77efded?auto=format&fit=crop&w=800&q=80" },
            "ENTJ": { name: "🇺🇸 미국 뉴욕", desc: "목표 지향적이고 스케일이 큰 당신! 세계 경제와 문화의 중심지, 뉴욕의 빌딩 숲에서 야망을 펼쳐보세요.", img: "https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?auto=format&fit=crop&w=800&q=80" }
        };

        function recommend() {
            const mbti = document.getElementById("mbti-select").value;
            const result = travelData[mbti];
            
            document.getElementById("dest-name").innerText = result.name;
            document.getElementById("dest-desc").innerText = result.desc;
            document.getElementById("dest-img").src = result.img;
            
            // 결과를 부드럽게 보여주기
            document.getElementById("result").style.display = "block";
        }
    </script>
</body>
</html>
